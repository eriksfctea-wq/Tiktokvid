<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>⚠ SYSTEM BREACH ⚠</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  color: red;
  font-family: monospace;
  height: 100%;
  overflow: hidden;
}

#container {
  padding: 20px;
  animation: glitch 0.2s infinite;
}

@keyframes glitch {
  0% { transform: translate(0,0); }
  25% { transform: translate(-2px,2px); }
  50% { transform: translate(2px,-2px); }
  75% { transform: translate(-2px,-2px); }
  100% { transform: translate(0,0); }
}

.warning {
  font-size: 26px;
  font-weight: bold;
  animation: blink 0.6s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

.progress {
  width: 100%;
  height: 22px;
  background: #300;
  margin-top: 15px;
}

.bar {
  height: 100%;
  width: 0%;
  background: red;
}

#watermark {
  position: fixed;
  bottom: 10px;
  right: 10px;
  font-size: 14px;
  opacity: 0.5;
  color: white;
}

#lock {
  position: fixed;
  inset: 0;
  z-index: 999;
}
</style>
</head>

<body>

<div id="lock"></div>

<div id="container">
  <div class="warning">⚠ ANDROID SYSTEM BREACHED ⚠</div>
  <p>Virus tingkat KRITIS terdeteksi</p>
  <p>Menghapus seluruh data...</p>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <p id="status">Memindai sistem...</p>
  <p id="timer">Sisa waktu: 10 detik</p>
</div>

<div id="watermark">© M4πi8</div>

<!-- 🔊 MUSIK -->
<audio id="alarm" loop>
  <source src="virus.mp3" type="audio/mpeg">
</audio>

<script>
/* FULLSCREEN */
document.documentElement.requestFullscreen?.();

/* AUDIO – WAJIB TAP 1x (aturan browser) */
const alarm = document.getElementById("alarm");

function startAudio() {
  alarm.volume = 1;
  alarm.play().catch(()=>{});
  document.removeEventListener("click", startAudio);
  document.removeEventListener("touchstart", startAudio);
}

document.addEventListener("click", startAudio);
document.addEventListener("touchstart", startAudio);

/* VIBRATION */
if (navigator.vibrate) {
  setInterval(()=>navigator.vibrate([500,300,500]), 1200);
}

/* DISABLE BACK */
history.pushState(null, null, location.href);
window.onpopstate = () => history.go(1);

/* PROGRESS */
let bar = document.getElementById("bar");
let statusText = document.getElementById("status");
let timerText = document.getElementById("timer");
let progress = 0;
let time = 10;

let messages = [
  "Menghapus WhatsApp...",
  "Menghapus Galeri...",
  "Menghapus Kontak...",
  "Menghapus Data Bank...",
  "Mengunci Sistem...",
  "Mengirim data..."
];

let interval = setInterval(() => {
  progress += Math.random() * 15;
  if (progress >= 100) progress = 100;
  bar.style.width = progress + "%";
  statusText.innerText = messages[Math.floor(Math.random() * messages.length)];
}, 700);

let countdown = setInterval(() => {
  time--;
  timerText.innerText = "Sisa waktu: " + time + " detik";
  if (time <= 0) {
    clearInterval(interval);
    clearInterval(countdown);
    alarm.pause();
    document.getElementById("container").innerHTML =
      "<h1 style='color:lime'>SEMUA DATA BERHASIL DI ALIHKAN</h1><p>TERIMAKASIH</p><p>Creator: M4πi8</p>";
  }
}, 1000);

/* UNLOCK CLICK AFTER 5s */
setTimeout(()=>document.getElementById("lock").style.display="none",5000);
</script>

</body>
</html>
